<!--컨텐츠 위치-->
<script src="/js/comm_fr.js"></script>

<script>
var today = new Date();
var year = today.getFullYear();
var month = "";
var day = "";

if ( String(today.getMonth() + 1).length <= 1 ) {
	month = "0" + (today.getMonth() + 1);
} else {
	month = (today.getMonth() + 1);
}
if ( String(today.getDate()).length <= 1 ) {
	day = "0" + today.getDate();
} else {
	day = today.getDate();
}

var startDay = String(year) + "." + String(month) + "." + String(day); 

$().ready(function() {
	 //init
	get_Date(String(year) + String(month) + String(day));
	fn_detail();
	fn_list();
	$("#current_date").text($("#sendForm input:hidden[name=START_DAY]").val()+" ~ "+$("#sendForm input:hidden[name=END_DAY]").val()); 
	$(document).on('click', 'a.btn_prev', function() {
		$("#sendForm input:hidden[name=START_DAY]").val($("#sendForm input:hidden[name=PREV_START_DAY]").val());
		$("#sendForm input:hidden[name=END_DAY]").val($("#sendForm input:hidden[name=PREV_END_DAY]").val());
		fn_list();
	 	$("#current_date").text($("#sendForm input:hidden[name=START_DAY]").val()+" ~ "+$("#sendForm input:hidden[name=END_DAY]").val()); 
	});
	
	$(document).on('click', 'a.btn_next', function() {
	   	$("#sendForm input:hidden[name=START_DAY]").val($("#sendForm input:hidden[name=NEXT_START_DAY]").val());
	   	$("#sendForm input:hidden[name=END_DAY]").val($("#sendForm input:hidden[name=NEXT_END_DAY]").val());
	   	fn_list();
	 	$("#current_date").text($("#sendForm input:hidden[name=START_DAY]").val()+" ~ "+$("#sendForm input:hidden[name=END_DAY]").val()); 
	});
});

function get_Date(Obj) {
	var vn_day1 = new Date(year, month-1, day);
	var i = vn_day1.getDay();
	if((i>0)&&(i<7)) {
		mon = 1 - i;
		fri = 5 - i;
		}
	var Cal_st = new Date(vn_day1.getFullYear(), vn_day1.getMonth(), vn_day1.getDate() + mon);
	var Cal_en = new Date(vn_day1.getFullYear(), vn_day1.getMonth(), vn_day1.getDate() + fri);
	
		if (String(Cal_st.getMonth() + 1).length <= 1) {
				st_month = "0" + (Cal_st.getMonth() + 1);
			} else {
				st_month = (Cal_st.getMonth() + 1);
			}
			if (String(Cal_st.getDate()).length <= 1) {
				st_day = "0" + Cal_st.getDate();
			} else {
				st_day = Cal_st.getDate();
			}
			if (String(Cal_en.getMonth() + 1).length <= 1) {
				en_month = "0" + (Cal_en.getMonth() + 1);
			} else {
				en_month = (Cal_en.getMonth() + 1);
			}
			if (String(Cal_en.getDate()).length <= 1) {
				en_day = "0" + Cal_en.getDate();
			} else {
				en_day = Cal_en.getDate();
			}

		$("#sendForm input:hidden[name=START_DAY]").val(Cal_st.getFullYear() + "." + st_month + "." + st_day);
		$("#sendForm input:hidden[name=END_DAY]").val(Cal_en.getFullYear() + "." + en_month + "." + en_day);
	}

	function fn_detail() {

		fn_comm_ajax({
			async : false,
			url : "/ajaxf/FR_BST_SVC/BistroInfo.do",
			data : $("#sendForm").serialize(),
			dataType : "json",
			success : function(data) {
				var dtObj = '';
				if (data.FILE_NM != null) {
					$(".infoBox div.photo > img")
					.attr("src", "/ajaxfile/CMN_SVC/FileView.do?GBN=X09&BISTRO_SEQ="+ data.BISTRO_SEQ);
					$(".infoBox div.photo > img").attr("alt",data.BISTRO_NM+" 내부");
				}
					dtObj += '	<dl class="txt">';
				if (data.BISTRO_NM != null) $(".infoBox #BISTRO_NM").append(data.BISTRO_NM);
				if (data.LOCATION != null) $(".infoBox #LOCATION").append(data.LOCATION);
				if (data.TEL_NO != null) $(".infoBox #TEL_NO").append(data.TEL_NO);
				if (data.OPER_TIME != null) $(".infoBox #OPER_TIME").append(data.OPER_TIME);
			}
		});
	}

	function fn_list() {
		fn_comm_ajax({
			url : "/ajaxf/FR_BST_SVC/BistroDateInfo.do",
			data : $("#sendForm").serialize(),
			dataType : "json",
			success : function(data) {
				var data = data[0];
				$("#sendForm").fn_comm_setValue(data);
				$("#sendForm input:hidden[name=START_DAY]").val(data.CURRENT_DAY);
				$("#sendForm input:hidden[name=END_DAY]").val(data.FRI_DAY);
				$("#sendForm input:hidden[name=PREV_START_DAY]").val(data.PREV_START_DAY);
				$("#sendForm input:hidden[name=PREV_END_DAY]").val(data.PREV_END_DAY);
				$("#sendForm input:hidden[name=NEXT_START_DAY]").val(data.NEXT_START_DAY);
				$("#sendForm input:hidden[name=NEXT_END_DAY]").val(data.NEXT_END_DAY);
			}
		});

		fn_comm_ajax({
			url : "/ajaxf/FR_BST_SVC/BistroCarteInfo.do",
			data : $("#sendForm").serialize(),
			dataType : "json",
			success : function(data) {
				$(".carte_list .list ul").empty();
				if (!fn_comm_isNull(data)) {
					var liObj = '';
					for (var i = 0; i < data.length; i++) {
						liObj += '<li>';
						liObj += '<div class="day">';
						liObj += '<span class="yymm">' + data[i].STD_YM + '</span>';
						liObj += '<span class="dd">' + data[i].STD_DD + '</span>';
						liObj += '<span class="txt">' + data[i].STD_DY + '</span>';
						liObj += '</div>';
						liObj += '<div class="menu">';
						if (data[i].CARTE1_NM != null || data[i].CARTE2_NM != null || data[i].CARTE3_NM != null) {
							if (data[i].CARTE1_NM != null) {
								liObj += '<p><span class="markRec markGreen">' + data[i].CARTE1_NM + '</span>';
								if (data[i].CARTE1_CONT != null) liObj += data[i].CARTE1_CONT.replace(/\n/g, "<br/>");
							}
							if (data[i].CARTE2_NM != null) {
								liObj += '<p><span class="markRec markBlue">' + data[i].CARTE2_NM + '</span>';
								if (data[i].CARTE2_CONT != null) liObj += data[i].CARTE2_CONT.replace(/\n/g, "<br/>");
							}
							if (data[i].CARTE3_NM != null) { 
								liObj += '<p><span class="markRec markOrange">' + data[i].CARTE3_NM + '</span>';
								if (data[i].CARTE3_CONT != null) liObj += data[i].CARTE3_CONT.replace(/\n/g, "<br/>");
							}
						} else {
							liObj += '<p><span class="markLine markGray">휴일</span>없음</p>';
						}

						liObj += '</div>';
						liObj += '</li>';
					}
						liObj += "<p class=\"origin_info\">";
						liObj += "<span>원산지</span>";
						liObj += data[0].ORIGIN_CONT;
						liObj += "</p>";
						$(liObj).appendTo($(".carte_list .list ul"));
				} else {
					var liObj = '<li class="typeNoArticle"><p class=\"no_article\">식단이 없습니다.</p></li>';
					$(liObj).appendTo($(".carte_list .list ul"));
				}

			}
		});
	}
</script>
